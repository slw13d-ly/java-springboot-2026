<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content})}"
>
  <div th:fragment="content" class="container my-3">
    <h3
      th:text="${foodForm != null and foodForm.id != null} ? '음식 기록 수정' : '음식 기록 작성'"
    ></h3>

    <form
      th:object="${foodForm}"
      th:action="${foodForm != null and foodForm.id != null} ? @{|/food/edit/${foodForm.id}|} : @{/food/create}"
      method="post"
    >
      <div class="row mb-3">
        <label for="name" class="form-label">음식 이름</label>
        <input type="text" id="name" th:field="*{name}" class="form-control" />
        <div class="text-danger mt-1" th:errors="*{name}"></div>
      </div>

      <div class="row mb-3">
        <label for="category" class="form-label">카테고리</label>
        <input
          type="text"
          id="category"
          th:field="*{category}"
          class="form-control"
          placeholder="예: 한식, 중식, 일식, 양식"
        />
        <div class="text-danger mt-1" th:errors="*{category}"></div>
      </div>

      <div class="row mb-3">
        <label for="rating" class="form-label">평점</label>
        <select id="rating" th:field="*{rating}" class="form-select">
          <option value="">선택하세요</option>
          <option value="1">1점</option>
          <option value="2">2점</option>
          <option value="3">3점</option>
          <option value="4">4점</option>
          <option value="5">5점</option>
        </select>
        <div class="text-danger mt-1" th:errors="*{rating}"></div>
      </div>

      <div class="row mb-3">
        <label for="eatDate" class="form-label">먹은 날짜</label>
        <input
          type="date"
          id="eatDate"
          th:field="*{eatDate}"
          class="form-control"
        />
        <div class="text-danger mt-1" th:errors="*{eatDate}"></div>
      </div>

      <div class="row mb-3">
        <label for="memo" class="form-label">메모</label>
        <textarea
          id="memo"
          th:field="*{memo}"
          class="form-control"
          rows="5"
        ></textarea>
        <div class="text-danger mt-1" th:errors="*{memo}"></div>
      </div>

      <div class="row">
        <div class="col">
          <div class="text-end">
            <button type="submit" class="btn btn-sm btn-primary">
              <i class="bi bi-floppy"></i> 저장
            </button>
            <a th:href="@{/food/list}" class="btn btn-sm btn-success">
              <i class="bi bi-list"></i> 목록
            </a>
          </div>
        </div>
      </div>
    </form>
  </div>
</html>
